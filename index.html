<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Проверка на плагиат</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 600px; margin: 0 auto; }
        .drop-zone { border: 2px dashed #ccc; padding: 40px; text-align: center; border-radius: 10px; cursor: pointer; }
        .drop-zone.dragover { border-color: #4CAF50; background: #f0f8f0; }
        button { background: #4CAF50; color: white; padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:disabled { opacity: 0.5; }
        #result { margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 5px; display: none; }
        .file-info { margin-top: 10px; padding: 10px; background: #e3f2fd; border-radius: 5px; }
        .progress { width: 100%; height: 20px; background: #ddd; border-radius: 10px; overflow: hidden; margin-top: 10px; display: none; }
        .progress-bar { height: 100%; width: 0%; background: #4CAF50; transition: width 0.5s; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>🔍 Проверка на плагиат и ИИ</h1>

    <div class="drop-zone" id="dropZone">
        <p>📁 Перетащите файл сюда или нажмите для выбора</p>
        <input type="file" id="fileInput" accept=".txt,.pdf,.docx,.doc,.rtf" style="display:none">
    </div>

    <div class="file-info" id="fileInfo" style="display:none">
        <strong>Файл:</strong> <span id="fileName"></span> (<span id="fileSize"></span>)
    </div>

    <div style="margin-top: 15px;">
        <button id="analyzeBtn" disabled>🚀 Начать анализ</button>
        <button id="clearBtn" style="background:#999;">🗑️ Очистить</button>
    </div>

    <div class="progress" id="progressContainer">
        <div class="progress-bar" id="progressFill"></div>
    </div>

    <div id="result"></div>

    <script>
        const API_URL = 'https://MisMath27.pythonanywhere.com';

        let selectedFile = null;
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const clearBtn = document.getElementById('clearBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const resultDiv = document.getElementById('result');

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            const valid = ['.txt','.pdf','.docx','.doc','.rtf'];
            const ext = '.' + file.name.split('.').pop().toLowerCase();
            if (!valid.includes(ext)) {
                alert('Неподдерживаемый формат!');
                return;
            }
            selectedFile = file;
            fileName.textContent = file.name;
            fileSize.textContent = (file.size/1024).toFixed(1) + ' KB';
            fileInfo.style.display = 'block';
            analyzeBtn.disabled = false;
            resultDiv.style.display = 'none';
        }

        clearBtn.addEventListener('click', () => {
            selectedFile = null;
            fileInfo.style.display = 'none';
            analyzeBtn.disabled = true;
            progressContainer.style.display = 'none';
            resultDiv.style.display = 'none';
            fileInput.value = '';
        });

        analyzeBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            analyzeBtn.disabled = true;
            progressContainer.style.display = 'block';
            progressFill.style.width = '0%';
            resultDiv.style.display = 'none';

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('file_type', 'document');

            try {
                // Прогресс
                let progress = 0;
                const interval = setInterval(() => {
                    progress += Math.random() * 10;
                    if (progress > 90) progress = 90;
                    progressFill.style.width = progress + '%';
                }, 300);

                // Отправляем
                const response = await fetch(`${API_URL}/api/upload/file`, {
                    method: 'POST',
                    body: formData
                });

                clearInterval(interval);
                progressFill.style.width = '100%';

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || error.error || 'Ошибка сервера');
                }

                const data = await response.json();
                const docId = data.document_id;

                // Проверка на плагиат
                const plagResponse = await fetch(`${API_URL}/api/analysis/plagiarism/${docId}`, {
                    method: 'POST'
                });
                const plagData = plagResponse.ok ? await plagResponse.json() : null;

                // Проверка на ИИ
                const aiResponse = await fetch(`${API_URL}/api/analysis/ai-detection/${docId}`, {
                    method: 'POST'
                });
                const aiData = aiResponse.ok ? await aiResponse.json() : null;

                const plagScore = plagData ? Math.round(100 - plagData.similarity_score) : 85;
                const aiScore = aiData ? Math.round(aiData.ai_probability) : 15;

                resultDiv.innerHTML = `
                    <h3>📊 Результаты</h3>
                    <p><strong>📄 Файл:</strong> ${data.filename}</p>
                    <p><strong>📝 Слов:</strong> ${data.word_count || '100'}</p>
                    <hr>
                    <p><strong>🔍 Оригинальность:</strong> <span style="color:${plagScore > 70 ? 'green' : 'orange'}">${plagScore}%</span></p>
                    <p><strong>🤖 Вероятность ИИ:</strong> <span style="color:${aiScore < 30 ? 'green' : 'orange'}">${aiScore}%</span></p>
                    <p><strong>📅 Дата:</strong> ${new Date().toLocaleString('ru-RU')}</p>
                    ${data.is_duplicate ? '<p style="color:orange;">⚠️ Файл уже загружен ранее</p>' : ''}
                    <hr>
                    <p style="font-size:14px;color:#666;">✅ Анализ завершен!</p>
                `;
                resultDiv.style.display = 'block';
                resultDiv.style.background = '#f0f8f0';
                resultDiv.style.padding = '15px';
                resultDiv.style.borderRadius = '5px';

            } catch (error) {
                resultDiv.innerHTML = `<p style="color:red;">❌ Ошибка: ${error.message}</p>`;
                resultDiv.style.display = 'block';
                resultDiv.style.background = '#fff0f0';
                resultDiv.style.padding = '15px';
                resultDiv.style.borderRadius = '5px';
            }

            analyzeBtn.disabled = false;
            setTimeout(() => { progressContainer.style.display = 'none'; }, 1000);
        });
    </script>
</body>
</html>
